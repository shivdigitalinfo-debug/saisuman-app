// ── Components ──
function Badge({status}){const c=STATUS_CFG[status]||{c:"#888",bg:"#eee"};return<span className="badge"style={{background:c.bg,color:c.c}}><span className="badge-dot"style={{background:c.c}}/>{status}</span>;}
function StatCard({label,value,sub,color,icon}){return<div className="stat-card"style={{borderLeft:`4px solid ${color}`}}><div className="stat-icon"style={{background:`${color}18`}}>{icon}</div><div><div className="stat-num">{value}</div><div className="stat-lbl">{label}</div>{sub&&<div className="stat-sub"style={{color}}>{sub}</div>}</div></div>;}
function SectionHead({title,onAdd,addLabel}){return<div className="sec-head"><div className="sec-title">{title}</div>{onAdd&&<button className="add-btn"onClick={onAdd}>{addLabel||"＋ Add"}</button>}</div>;}
function EmptyState({msg}){return<div className="empty-state">😶 {msg||"Nothing here yet"}</div>;}

function ModalBase({title,onClose,children}){
  return<div className="modal-bg"onClick={onClose}>
    <div className="modal-box"onClick={e=>e.stopPropagation()}>
      <div className="modal-head"><div className="modal-title">{title}</div><button className="modal-close"onClick={onClose}>×</button></div>
      <div className="modal-body">{children}</div>
    </div>
  </div>;
}
function SaveRow({onSave,onDel,label}){return<div style={{display:"flex",gap:8,marginTop:4}}><button className="btn-primary"onClick={onSave}>{label||"Save"}</button>{onDel&&<button className="btn-danger"onClick={onDel}>Delete</button>}</div>;}

// Job Modal
function JobModal({data,onSave,onDel,onClose}){

    <div className="g2"><div><label className="lbl">Service</label><select value={f.service}onChange={e=>s("service",e.target.value)}><option value="">Select...</option>{SERVICES.map(x=><option key={x}>{x}</option>)}</select></div><div><label className="lbl">Property</label><select value={f.property}onChange={e=>s("property",e.target.value)}><option value="">Select...</option>{PROP_TYPES.map(x=><option key={x}>{x}</option>)}</select></div></div>
    <div className="g3"><div><label className="lbl">Width (mm)</label><input value={f.mW}onChange={e=>s("mW",e.target.value)}placeholder="2400"/></div><div><label className="lbl">Height (mm)</label><input value={f.mH}onChange={e=>s("mH",e.target.value)}placeholder="1200"/></div><div><label className="lbl">Date</label><input type="date"value={f.date}onChange={e=>s("date",e.target.value)}/></div></div>

    <div className="divider">Billing</div>

    {(+f.amount)>0&&<div style={{borderRadius:8,padding:"9px 12px",fontSize:13,fontWeight:600,background:bal>0?"#FEF3C7":"#D1FAE5",color:bal>0?"#92400E":"#065F46"}}>{bal>0?`⚠️ Balance: ₹${bal.toLocaleString()}`:"✅ Fully Paid"}</div>}
    <div><label className="lbl">Notes</label><textarea value={f.note||""}onChange={e=>s("note",e.target.value)}placeholder="Job notes..."/></div>

// Quote Modal
function QuoteModal({data,onSave,onDel,onClose}){
  const blank={customerName:"",companyName:"",phone:"",address:"",subject:"",date:TODAY,validUntil:"",custId:"",introText:"We are pleased to offer our services as per your requirements, focusing on quality, finishing, and timely completion. Our aim is to deliver work that stands out and meets your expectations. We look forward to serving you.",items:[{desc:"",qty:"1",area:"",rate:""}],total:0,status:"Draft",note:""};
  const [f,setF]=useState({...blank,...data});
  const s=(k,v)=>setF(x=>({...x,[k]:v}));
  const calcTotal=items=>items.reduce((sum,it)=>{const r=parseFloat(it.rate)||0;const q2=parseFloat(it.qty)||1;const a=parseFloat(it.area)||1;return sum+(r*q2*a);},0);
  const updItem=(i,k,v)=>{const it=[...f.items];it[i]={...it[i],[k]:v};const tot=calcTotal(it);setF(x=>({...x,items:it,total:tot}));};
  const addRow=()=>{const it=[...f.items,{desc:"",qty:"1",area:"",rate:""}];setF(x=>({...x,items:it,total:calcTotal(it)}));};
  const rmRow=i=>{if(f.items.length===1)return;const it=f.items.filter((_,j)=>j!==i);setF(x=>({...x,items:it,total:calcTotal(it)}));};

  const previewAndShare=async(doShare)=>{
    const html=buildQuotationHTML(f);
    if(doShare){
      try{
        const blob=new Blob([html],{type:"text/html"});
        const file=new File([blob],`Sai_Suman_Quotation_${(f.customerName||"Customer").replace(/\s+/g,"_")}.html`,{type:"text/html"});
        if(navigator.share&&navigator.canShare&&navigator.canShare({files:[file]})){
          await navigator.share({files:[file],title:`Quotation – ${f.customerName}`,text:`Dear ${f.customerName},\n\nPlease find your quotation from Sai Suman Glass & Hardware, Nashik.\n\nFor queries: +91 9604086007 / 8421502507`});
        } else {
          const url=URL.createObjectURL(blob);
          const a=document.createElement("a");a.href=url;a.download=`Sai_Suman_Quotation_${(f.customerName||"Customer").replace(/\s+/g,"_")}.html`;a.click();
          setTimeout(()=>{
            const msg=`Hello ${f.customerName}! 🙏\n\nPlease find your quotation from *Sai Suman Glass & Hardware, Nashik*.\n\n📋 Subject: ${f.subject||"Glass & Hardware Work"}\n💰 Total: ₹${Number(f.total||0).toLocaleString()}\n📅 Valid: ${f.validUntil||"30 days"}\n\nQuotation file has been downloaded. Please check your downloads.\n\n📞 9604086007 / 8421502507\n✉️ Saisumancorporation@gmail.com\n— Sai Suman Sales Corporation, Nashik`;
            openWA(f.phone,msg);
          },800);
        }
      }catch(e){printDoc(buildQuotationHTML(f));}
    } else {
      printDoc(html);
    }
  };

  return<ModalBase title={f.id?"✏️ Edit Quotation":"📄 New Quotation"}onClose={onClose}>
    <div className="divider">Customer Details</div>
    <div className="g2">
      <div><label className="lbl">Customer Name *</label><input value={f.customerName}onChange={e=>s("customerName",e.target.value)}placeholder="e.g. Rahul Kulkarni"/></div>
      <div><label className="lbl">Phone *</label><input value={f.phone}onChange={e=>s("phone",e.target.value)}placeholder="Mobile number"/></div>
    </div>
    <div><label className="lbl">Company / Firm Name</label><input value={f.companyName||""}onChange={e=>s("companyName",e.target.value)}placeholder="Company name (optional)"/></div>
    <div><label className="lbl">Customer Address</label><input value={f.address}onChange={e=>s("address",e.target.value)}placeholder="Customer address"/></div>
    <div className="divider">Quotation Details</div>
    <div className="g3">
      <div><label className="lbl">Date</label><input type="date"value={f.date}onChange={e=>s("date",e.target.value)}/></div>
      <div><label className="lbl">Valid Until</label><input type="date"value={f.validUntil||""}onChange={e=>s("validUntil",e.target.value)}/></div>
      <div><label className="lbl">Customer ID</label><input value={f.custId||""}onChange={e=>s("custId",e.target.value)}placeholder="Auto"/></div>
    </div>
    <div><label className="lbl">Subject / Work Type</label><input value={f.subject||""}onChange={e=>s("subject",e.target.value)}placeholder="e.g. Aluminium Sliding Windows for Flat"/></div>
    <div><label className="lbl">Intro Text (editable)</label><textarea style={{minHeight:72}}value={f.introText||""}onChange={e=>s("introText",e.target.value)}/></div>
    <div className="divider">📋 Quotation Items — Add / Remove Rows Freely</div>
    <div style={{background:"#F0F9FF",border:"1px solid #BAE6FD",borderRadius:8,padding:"7px 10px",fontSize:11,color:"#0369A1",marginBottom:4}}>
      💡 Tip: Each row = one item. Add size details, qty, area (sq.ft) and rate per unit. Amount auto-calculates.
    </div>
    {f.items.map((it,i)=><div key={i}style={{background:"var(--ghost)",border:"1px solid var(--border)",borderRadius:10,padding:"10px",marginBottom:6}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:7}}>
        <div style={{fontSize:11,fontWeight:700,color:"var(--blue)",background:"#EEF5FA",padding:"2px 9px",borderRadius:20}}>Row {i+1}</div>
        {f.items.length>1&&<button onClick={()=>rmRow(i)}style={{background:"#FEE2E2",border:"none",borderRadius:6,color:"#EF4444",padding:"3px 10px",cursor:"pointer",fontSize:12,fontWeight:700}}>✕ Remove</button>}
      </div>
      <div><label className="lbl">Size / Description (you can write full details)</label>
        <textarea style={{minHeight:64,fontSize:12}}value={it.desc}onChange={e=>updItem(i,"desc",e.target.value)}placeholder="e.g. Providing and fixing Aluminium sliding window 3 track with mesh, size 4ft x 4ft including glass..."/>
      </div>
      <div className="g3"style={{marginTop:8}}>
        <div><label className="lbl">Quantity (Nos)</label><input type="number"value={it.qty}onChange={e=>updItem(i,"qty",e.target.value)}placeholder="1"/></div>
        <div><label className="lbl">Area (sq.ft)</label><input type="number"value={it.area}onChange={e=>updItem(i,"area",e.target.value)}placeholder="e.g. 16"/></div>
        <div><label className="lbl">Rate (₹)</label><input type="number"value={it.rate}onChange={e=>updItem(i,"rate",e.target.value)}placeholder="e.g. 650"/></div>
      </div>
      {(parseFloat(it.rate)||0)>0&&<div style={{marginTop:6,fontSize:12,fontWeight:700,color:"var(--blue)",background:"#EEF5FA",padding:"5px 10px",borderRadius:6}}>
        Amount: ₹{((parseFloat(it.qty)||1)*(parseFloat(it.area)||1)*(parseFloat(it.rate)||0)).toLocaleString()}
      </div>}
    </div>)}
    <button onClick={addRow}style={{background:"#EEF5FA",color:"var(--blue)",borderRadius:8,padding:"9px",fontSize:12,fontWeight:700,width:"100%",border:"1.5px dashed var(--border)",cursor:"pointer",marginBottom:4}}>＋ Add Another Row</button>
    {f.total>0&&<div style={{background:"#0E7490",borderRadius:10,padding:"12px 14px",display:"flex",justifyContent:"space-between",alignItems:"center"}}><span style={{color:"rgba(255,255,255,.7)",fontSize:12,fontWeight:600}}>TOTAL AMOUNT</span><span style={{color:"white",fontWeight:800,fontSize:20}}>₹{Number(f.total).toLocaleString()}</span></div>}
    <div className="g2"><div><label className="lbl">Status</label><select value={f.status}onChange={e=>s("status",e.target.value)}>{["Draft","Sent","Confirmed","Rejected"].map(x=><option key={x}>{x}</option>)}</select></div><div><label className="lbl">Notes (internal)</label><input value={f.note||""}onChange={e=>s("note",e.target.value)}placeholder="Internal notes"/></div></div>
    <div style={{marginTop:6,display:"flex",flexDirection:"column",gap:8}}>
      <div style={{display:"flex",gap:8}}>
        <button onClick={()=>onSave(f)}style={{flex:1,background:"var(--blue)",color:"white",border:"none",borderRadius:9,padding:"12px",fontWeight:700,fontSize:13,cursor:"pointer"}}>{f.id?"Save Changes":"Save Quotation"}</button>
        {f.id&&<button onClick={()=>onDel(f.id)}style={{background:"#FEE2E2",color:"#EF4444",border:"none",borderRadius:9,padding:"12px 14px",fontWeight:700,fontSize:13,cursor:"pointer"}}>Delete</button>}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
        <button onClick={()=>previewAndShare(false)}style={{background:"#EDE9FE",color:"#8B5CF6",border:"none",borderRadius:9,padding:"12px",fontWeight:700,fontSize:12,cursor:"pointer"}}>🖨️ Print / PDF</button>
        <button onClick={()=>previewAndShare(true)}style={{background:"#25D366",color:"white",border:"none",borderRadius:9,padding:"12px",fontWeight:700,fontSize:12,cursor:"pointer"}}>💬 Share on WhatsApp</button>
      </div>
    </div>
  </ModalBase>;
}

      {[["1️⃣","Open Firebase Console","Go to: console.firebase.google.com"],["2️⃣","Create Free Project","Click 'Add project' → Name it 'saisuman-app'"],["3️⃣","Add Web App","Click </> icon → Register app → Copy config"],["4️⃣","Enable Google Login","Authentication → Sign-in method → Enable Google"],["5️⃣","Enable Firestore","Firestore Database → Create → Test mode"]].map(([n,t,d])=><div key={n} style={{display:"flex",gap:12,marginBottom:12,alignItems:"flex-start"}}><div style={{fontSize:20,flexShrink:0}}>{n}</div><div><div style={{fontWeight:700,fontSize:13,color:"#0D1F2D"}}>{t}</div><div style={{fontSize:11,color:"#4A6574",marginTop:1}}>{d}</div></div></div>)}

      <div style={{textAlign:"center",marginTop:14}}><a href="https://console.firebase.google.com" target="_blank" style={{background:"#0B4F8A",color:"white",borderRadius:9,padding:"11px 24px",fontSize:13,fontWeight:700,textDecoration:"none",display:"inline-block"}}>🔥 Open Firebase Console</a></div>

function App(){
  const [tab,setTab]=useState("dash");
  const [jobs,setJobs]=useState([]);
  const [quotes,setQuotes]=useState([]);
  const [stock,setStock]=useState([]);
  const [purchases,setPurchases]=useState([]);
  const [expenses,setExpenses]=useState([]);
  const [reminders,setReminders]=useState([]);
  const [modal,setModal]=useState(null);
  const [toast,setToast]=useState(null);
  const [search,setSearch]=useState("");
  const [fStatus,setFStatus]=useState("All");
  const [tplSel,setTplSel]=useState(null);
  const [tplVars,setTplVars]=useState({name:"",service:"",date:"",address:"",amount:"",paid:"",balance:""});
  const [copied,setCopied]=useState(false);
  const [user,setUser]=useState(null);
  const [authLoading,setAuthLoading]=useState(true);
  const [dataLoading,setDataLoading]=useState(false);
  const [signInLoading,setSignInLoading]=useState(false);

  useEffect(()=>{
    if(!IS_CONFIGURED){setAuthLoading(false);return;}
    return firebase.auth().onAuthStateChanged(u=>{setUser(u);setAuthLoading(false);});
  },[]);

  useEffect(()=>{
    if(!user||!IS_CONFIGURED)return;
    setDataLoading(true);
    const uid=user.uid;const db=firebase.firestore();
    const COLS=["jobs","quotes","stock","purchases","expenses","reminders"];
    const SETS=[setJobs,setQuotes,setStock,setPurchases,setExpenses,setReminders];
    let done=0;
    const unsubs=COLS.map((col,i)=>db.collection(`users/${uid}/${col}`).onSnapshot(snap=>{
      SETS[i](snap.docs.map(d=>({...d.data(),id:d.id})));
      done++;if(done>=COLS.length)setDataLoading(false);
    },()=>setDataLoading(false)));
    return()=>unsubs.forEach(u=>u());
  },[user]);

  const showToast=msg=>{setToast(msg);setTimeout(()=>setToast(null),2500);};
  const closeModal=()=>setModal(null);

  const fsSave=async(col,item)=>{
    if(!user)return;const db=firebase.firestore();
    const ref=db.collection(`users/${user.uid}/${col}`);
    if(item.id&&typeof item.id==="string"&&item.id.length>10){await ref.doc(item.id).set(item);}
    else{const d=ref.doc();await d.set({...item,id:d.id});}
  };
  const fsDel=async(col,id)=>{if(!user)return;await firebase.firestore().collection(`users/${user.uid}/${col}`).doc(id).delete();};
  const fsUpd=async(col,id,data)=>{if(!user)return;await firebase.firestore().collection(`users/${user.uid}/${col}`).doc(id).update(data);};

  const signIn=async()=>{setSignInLoading(true);try{await firebase.auth().signInWithPopup(new firebase.auth.GoogleAuthProvider());}catch(e){console.error(e);}setSignInLoading(false);};
  const signOutUser=()=>firebase.auth().signOut();

  const saveJob=async j=>{await fsSave("jobs",j);closeModal();showToast(j.id&&j.id.length>10?"✅ Job updated!":"✅ Job added!");};
  const delJob=async id=>{await fsDel("jobs",id);closeModal();showToast("Deleted");};
  const saveQuote=async q=>{await fsSave("quotes",q);closeModal();showToast("✅ Quotation saved!");};
  const delQuote=async id=>{await fsDel("quotes",id);closeModal();};
  const saveStock=async s=>{await fsSave("stock",s);closeModal();showToast("✅ Stock updated!");};
  const delStock=async id=>{await fsDel("stock",id);closeModal();};
  const savePurch=async p=>{await fsSave("purchases",p);closeModal();showToast("✅ Purchase saved!");};
  const delPurch=async id=>{await fsDel("purchases",id);closeModal();};
  const saveExp=async e=>{await fsSave("expenses",e);closeModal();showToast("✅ Expense saved!");};
  const delExp=async id=>{await fsDel("expenses",id);closeModal();};
  const saveRem=async r=>{await fsSave("reminders",r);closeModal();showToast("✅ Reminder saved!");};
  const delRem=async id=>{await fsDel("reminders",id);closeModal();};
  const toggleRem=async id=>{const r=reminders.find(x=>x.id===id);if(r)await fsUpd("reminders",id,{done:!r.done});};

  // Stats
  const totalRev=jobs.reduce((s,j)=>s+(+j.amount||0),0);
  const totalRec=jobs.reduce((s,j)=>s+(+j.paid||0),0);
  const totalExp=expenses.reduce((s,e)=>s+(+e.amount||0),0);
  const lowStock=stock.filter(i=>i.qty<=i.minQty);
  const overdueRem=reminders.filter(r=>!r.done&&r.date<=TODAY);
  const pendingJobs=jobs.filter(j=>!["Completed","Cancelled"].includes(j.status));

  // Filtered jobs
  const filteredJobs=jobs.filter(j=>{
    const q=search.toLowerCase();
    return(!q||[j.name,j.phone,j.address,j.service].some(x=>(x||"").toLowerCase().includes(q)))&&(fStatus==="All"||j.status===fStatus);
  });

  const fillTpl=msg=>msg.replace(/{(\w+)}/g,(_,k)=>tplVars[k]||`{${k}}`);

  // ── Auth gates ──
  if(authLoading)return(<div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"#EFF6FB",flexDirection:"column",gap:16}}>
    <div style={{width:48,height:48,border:"4px solid #D8EDF8",borderTopColor:"#0B4F8A",borderRadius:"50%",animation:"spin 1s linear infinite"}}/>
    <div style={{color:"#0B4F8A",fontWeight:600,fontSize:14}}>Loading...</div><style>{`@keyframes spin{to{transform:rotate(360deg)}}`}</style></div>);
  if(!IS_CONFIGURED)return<SetupScreen/>;
  if(!user)return<LoginScreen onSignIn={signIn} loading={{signInLoading}}/>;
  if(dataLoading)return(<div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"#EFF6FB",flexDirection:"column",gap:16}}>
    <div style={{width:48,height:48,border:"4px solid #D8EDF8",borderTopColor:"#0B4F8A",borderRadius:"50%",animation:"spin 1s linear infinite"}}/>
    <div style={{color:"#0B4F8A",fontWeight:600,fontSize:14}}>Syncing your data...</div><style>{`@keyframes spin{to{transform:rotate(360deg)}}`}</style></div>);

  return<div style={{fontFamily:"-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif",background:"#EFF6FB",minHeight:"100vh"}}>

    {/* TOPBAR */}
    <div className="topbar">
      <div style={{display:"flex",alignItems:"center",gap:10}}>
        <div style={{width:34,height:34,background:"rgba(255,255,255,.12)",borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",fontSize:16}}>🏗️</div>
        <div><div style={{color:"white",fontWeight:800,fontSize:13}}>Sai Suman Glass & Hardware</div><div style={{color:"rgba(255,255,255,.5)",fontSize:10,letterSpacing:1}}>BUSINESS MANAGER · NASHIK</div></div>
      </div>
      <div style={{display:"flex",gap:6,alignItems:"center"}}>
        {overdueRem.length>0&&<div style={{background:"#EF4444",color:"white",borderRadius:20,padding:"2px 8px",fontSize:10,fontWeight:700}}>🔔{overdueRem.length}</div>}
        {lowStock.length>0&&<div style={{background:"#F97316",color:"white",borderRadius:20,padding:"2px 8px",fontSize:10,fontWeight:700}}>📦{lowStock.length}</div>}
        <button style={{background:"#25D366",color:"white",borderRadius:7,padding:"7px 12px",fontWeight:700,fontSize:11,border:"none",cursor:"pointer"}}onClick={()=>setModal({type:"job",data:{}})}>＋ Job</button>
        {user&&<button onClick={signOutUser} style={{background:"rgba(255,255,255,.15)",color:"white",borderRadius:7,padding:"7px 10px",fontWeight:600,fontSize:11,border:"none",cursor:"pointer"}} title={`Signed in as ${user.email}`}>👤 Logout</button>}
      </div>
    </div>

    {/* TABS */}
    <div className="tabs">
      {TABS.map(t=><button key={t.id}className={`tab-btn${tab===t.id?" active":""}`}onClick={()=>setTab(t.id)}>
        {t.i} {t.l}
        {t.id==="reminders"&&overdueRem.length>0&&<span style={{background:"#EF4444",color:"white",borderRadius:"50%",width:14,height:14,fontSize:9,display:"inline-flex",alignItems:"center",justifyContent:"center",fontWeight:800}}>{overdueRem.length}</span>}
        {t.id==="stock"&&lowStock.length>0&&<span style={{background:"#F97316",color:"white",borderRadius:"50%",width:14,height:14,fontSize:9,display:"inline-flex",alignItems:"center",justifyContent:"center",fontWeight:800}}>{lowStock.length}</span>}
      </button>)}
    </div>

    <div className="content">

    {/* ── DASHBOARD ── */}
    {tab==="dash"&&<>
      <div className="g2"><StatCard label="Pending Jobs"value={pendingJobs.length}color="#F97316"icon="⏳"sub="Need attention"/><StatCard label="Completed"value={jobs.filter(j=>j.status==="Completed").length}color="#10B981"icon="✅"sub="All time"/><StatCard label="Balance Due"value={`₹${((totalRev-totalRec)/1000).toFixed(1)}k`}color="#6B7AFF"icon="💰"sub={`Billed ₹${(totalRev/1000).toFixed(1)}k`}/><StatCard label="Net Profit"value={`₹${((totalRec-totalExp)/1000).toFixed(1)}k`}color="#10B981"icon="📈"sub={`Exp ₹${(totalExp/1000).toFixed(1)}k`}/></div>
      {overdueRem.length>0&&<div className="alert-box"style={{background:"#FEF3C7",border:"1px solid #FCD34D"}}><div style={{fontWeight:700,fontSize:13,color:"#92400E",marginBottom:6}}>🔔 {overdueRem.length} Follow-up{overdueRem.length>1?"s":""} Due!</div>{overdueRem.slice(0,2).map(r=><div key={r.id}style={{fontSize:12,color:"#92400E",marginBottom:2}}>• {r.customerName} — {r.note}</div>)}<button style={{marginTop:6,background:"#F59E0B",color:"white",borderRadius:8,padding:"5px 12px",fontSize:11,fontWeight:700,border:"none",cursor:"pointer"}}onClick={()=>setTab("reminders")}>View Reminders →</button></div>}
      {lowStock.length>0&&<div className="alert-box"style={{background:"#FFF0E6",border:"1px solid #FED7AA"}}><div style={{fontWeight:700,fontSize:13,color:"#9A3412",marginBottom:6}}>📦 {lowStock.length} Low Stock Alert{lowStock.length>1?"s":""}!</div>{lowStock.slice(0,2).map(i=><div key={i.id}style={{fontSize:12,color:"#9A3412",marginBottom:2}}>• {i.name}: {i.qty} {i.unit} left</div>)}<button style={{marginTop:6,background:"#F97316",color:"white",borderRadius:8,padding:"5px 12px",fontSize:11,fontWeight:700,border:"none",cursor:"pointer"}}onClick={()=>setTab("stock")}>View Stock →</button></div>}
      <div className="card"><div style={{padding:"11px 13px",borderBottom:"1px solid #EEF5FA",display:"flex",justifyContent:"space-between",alignItems:"center"}}><div style={{fontWeight:700,fontSize:13,color:"var(--dark)"}}>⚡ Active Jobs</div><button style={{fontSize:11,color:"var(--blue2)",background:"none",border:"none",cursor:"pointer",fontWeight:600}}onClick={()=>setTab("jobs")}>View All →</button></div>
        {pendingJobs.slice(0,5).map(j=><div key={j.id}className="row-item"onClick={()=>setModal({type:"job",data:j})}><div style={{display:"flex",alignItems:"center",gap:10}}><div style={{width:32,height:32,borderRadius:9,background:"#EEF5FA",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,color:"var(--blue)",fontSize:12,flexShrink:0}}>{(j.name||"?")[0]}</div><div style={{flex:1}}><div style={{fontWeight:700,fontSize:13,color:"var(--dark)"}}>{j.name}</div><div style={{fontSize:11,color:"var(--mid)"}}>{j.service}</div></div><Badge status={j.status}/></div></div>)}
        {pendingJobs.length===0&&<EmptyState msg="All jobs completed! 🎉"/>}
      </div>
      <div style={{background:"linear-gradient(135deg,#0B4F8A,#1565A8)",borderRadius:14,padding:"16px"}}>
        <div style={{color:"rgba(255,255,255,.5)",fontSize:10,letterSpacing:2,textTransform:"uppercase",marginBottom:10}}>Revenue Overview</div>
        <div className="g3">{[["Billed",`₹${(totalRev/1000).toFixed(1)}k`,"#fff"],["Received",`₹${(totalRec/1000).toFixed(1)}k`,"#7DE8B0"],["Expenses",`₹${(totalExp/1000).toFixed(1)}k`,"#FFB347"]].map(([l,v,c])=><div key={l}style={{background:"rgba(255,255,255,.08)",borderRadius:10,padding:"11px 10px"}}><div style={{fontSize:16,fontWeight:800,color:c}}>{v}</div><div style={{fontSize:10,color:"rgba(255,255,255,.45)",marginTop:3}}>{l}</div></div>)}</div>
      </div>
    </>}

    {/* ── JOBS ── */}
    {tab==="jobs"&&<>
      <div style={{display:"flex",gap:8}}><input style={{flex:1,padding:"9px 12px"}}placeholder="🔍 Search name, phone, service..."value={search}onChange={e=>setSearch(e.target.value)}/><button className="add-btn"onClick={()=>setModal({type:"job",data:{}})}>＋</button></div>
      <div className="filter-pills">{["All",...STATUSES].map(st=><button key={st}className="fpill"onClick={()=>setFStatus(st)}style={{borderColor:fStatus===st?"var(--blue)":"var(--border)",background:fStatus===st?"var(--blue)":"white",color:fStatus===st?"white":"var(--mid)"}}>{st}</button>)}</div>
      <div className="card">
        <div style={{padding:"9px 13px",borderBottom:"1px solid #EEF5FA",fontSize:12,fontWeight:700,color:"var(--dark)"}}>{filteredJobs.length} Jobs</div>
        {filteredJobs.length===0&&<EmptyState msg="No jobs found"/>}
        {filteredJobs.map(j=>{const bal=(+j.amount||0)-(+j.paid||0);return<div key={j.id}className="row-item">
          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:5}}onClick={()=>setModal({type:"job",data:j})}>
            <div style={{width:34,height:34,borderRadius:9,background:"#EEF5FA",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,color:"var(--blue)",fontSize:13,flexShrink:0}}>{(j.name||"?")[0]}</div>
            <div style={{flex:1,minWidth:0}}><div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}><span style={{fontWeight:700,fontSize:13,color:"var(--dark)"}}>{j.name}</span><Badge status={j.status}/></div><div style={{fontSize:11,color:"var(--mid)"}}>📞{j.phone} · 📍{j.address}</div></div>
            {j.amount>0&&<div style={{textAlign:"right",flexShrink:0}}><div style={{fontWeight:800,fontSize:13,color:bal>0?"#F97316":"#10B981"}}>₹{Number(j.amount).toLocaleString()}</div>{bal>0&&<div style={{fontSize:10,color:"#F97316"}}>₹{bal.toLocaleString()} due</div>}</div>}
          </div>
          <div style={{display:"flex",gap:5,flexWrap:"wrap",marginLeft:44}}>
            <span className="chip"style={{background:"#EEF5FA",color:"var(--blue)"}}>🔧 {j.service}</span>
            {j.mW&&<span className="chip"style={{background:"#F0F7FC",color:"var(--mid)"}}>📐 {j.mW}×{j.mH}mm</span>}
            {j.photos?.length>0&&<span className="chip"style={{background:"#F0F7FC",color:"var(--mid)"}}>📷{j.photos.length}</span>}
            <button className="btn-sm"style={{background:"#EDE9FE",color:"#8B5CF6"}}onClick={e=>{e.stopPropagation();setModal({type:"quote",data:{customerName:j.name,phone:j.phone,address:j.address,date:TODAY,validDays:15,items:[{desc:j.service,qty:1,unit:"sq.ft",rate:0,amount:0}],total:0,status:"Draft",note:""}});}}>📄 Quote</button>
            <button className="btn-sm"style={{background:"#D1FAE5",color:"#065F46"}}onClick={e=>{e.stopPropagation();openWA(j.phone,`Hello ${j.name}! 🙏\n\nStatus update for your *${j.service}* at *Sai Suman Glass & Hardware, Nashik*:\n\n🔄 Status: *${j.status}*\n\nFor queries please call us.\n\n📞 +91 84215 02507`);}}>💬 WA</button>
          </div>
        </div>;})}
      </div>
    </>}

    {/* ── KANBAN ── */}
    {tab==="kanban"&&<>
      <div style={{background:"white",borderRadius:10,padding:"9px 12px",border:"1px solid var(--border)",fontSize:12,color:"var(--mid)"}}>💡 Tap any card to update status or details</div>
      <div className="kanban-wrap">{STATUSES.map(col=>{const c=STATUS_CFG[col];const colJobs=jobs.filter(j=>j.status===col);return<div key={col}className="kanban-col"><div className="kanban-head"style={{background:c.bg}}><span style={{fontSize:11,fontWeight:700,color:c.c}}>{col}</span><div className="kanban-num"style={{background:c.c}}>{colJobs.length}</div></div>{colJobs.map(j=><div key={j.id}className="kanban-card"style={{borderLeftColor:c.c}}onClick={()=>setModal({type:"job",data:j})}><div style={{fontWeight:700,fontSize:12,color:"var(--dark)",marginBottom:3}}>{j.name}</div><div style={{fontSize:10,color:"var(--mid)",marginBottom:4}}>{j.service}</div>{j.amount>0&&<div style={{fontSize:12,fontWeight:700,color:(+j.amount-+j.paid)>0?"#F97316":"#10B981"}}>₹{Number(j.amount).toLocaleString()}</div>}<div style={{fontSize:10,color:"var(--light)",marginTop:3}}>📅{j.date}</div></div>)}{colJobs.length===0&&<div style={{background:"white",borderRadius:10,padding:"14px",textAlign:"center",color:"var(--border)",fontSize:12,border:"1.5px dashed var(--border)"}}>Empty</div>}</div>;})}
      </div>
    </>}

    {/* ── QUOTATIONS ── */}
    {tab==="quotes"&&<>
      <SectionHead title="📄 Quotations"onAdd={()=>setModal({type:"quote",data:{}})}addLabel="＋ New"/>
      <div className="card">
        {quotes.length===0&&<EmptyState msg="No quotations yet"/>}
        {quotes.map(q=><div key={q.id}style={{padding:"13px",borderBottom:"1px solid #F0F7FC"}}>
          <div style={{display:"flex",alignItems:"flex-start",gap:8,marginBottom:7}}>
            <div style={{flex:1}}><div style={{fontWeight:700,fontSize:13,color:"var(--dark)"}}>{q.customerName}</div><div style={{fontSize:11,color:"var(--mid)"}}>#QT-{String(q.id).slice(-4)} · {q.date} · ₹{Number(q.total||0).toLocaleString()}</div></div>
            <span style={{background:q.status==="Sent"?"#D1FAE5":q.status==="Confirmed"?"#E0F2FE":"#EEF0FF",color:q.status==="Sent"?"#065F46":q.status==="Confirmed"?"#0369A1":"#6B7AFF",padding:"2px 9px",borderRadius:20,fontSize:10,fontWeight:700}}>{q.status}</span>
          </div>
          <div style={{fontSize:11,color:"var(--mid)",marginBottom:8}}>{q.items?.length||0} items · {q.items?.[0]?.desc}</div>
          <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
            <button className="btn-sm"style={{background:"#EEF5FA",color:"var(--blue)"}}onClick={()=>setModal({type:"quote",data:q})}>✏️ Edit</button>
            <button className="btn-sm"style={{background:"#EDE9FE",color:"#8B5CF6"}}onClick={()=>printDoc(buildQuotationHTML(q))}>🖨️ Print PDF</button>
            <button className="btn-sm"style={{background:"#D1FAE5",color:"#065F46"}}onClick={()=>openWA(q.phone,`Hello ${q.customerName}! 📋\n\nYour quotation for *${q.items?.[0]?.desc||"glass work"}* is ready!\n\n💰 *Total: ₹${Number(q.total||0).toLocaleString()}*\nValid for ${q.validDays||15} days.\n\nPlease confirm to proceed!\n\n— Sai Suman Glass & Hardware, Nashik\n📞 +91 84215 02507`)}>💬 Send WA</button>
          </div>
        </div>)}
      </div>
    </>}

    {/* ── INVOICES ── */}
    {tab==="invoices"&&<>
      <SectionHead title="🧾 Invoices"/>
      <div style={{background:"#FEF3C7",border:"1px solid #FCD34D",borderRadius:10,padding:"9px 12px",fontSize:12,color:"#92400E"}}>💡 Invoices are generated from Sent or Confirmed quotations.</div>
      <div className="card">
        {quotes.filter(q=>["Sent","Confirmed"].includes(q.status)).length===0&&<EmptyState msg="No invoices yet. Create a quotation first."/>}
        {quotes.filter(q=>["Sent","Confirmed"].includes(q.status)).map(q=>{const j=jobs.find(x=>x.name===q.customerName);const bal=(+q.total||0)-(+j?.paid||0);return<div key={q.id}style={{padding:"13px",borderBottom:"1px solid #F0F7FC"}}>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
            <div style={{flex:1}}><div style={{fontWeight:700,fontSize:13,color:"var(--dark)"}}>{q.customerName}</div><div style={{fontSize:11,color:"var(--mid)"}}>INV-{String(q.id).slice(-4)} · {q.date} · {q.items?.[0]?.desc}</div></div>
            <div style={{textAlign:"right"}}><div style={{fontWeight:800,fontSize:13,color:"var(--dark)"}}>₹{Number(q.total||0).toLocaleString()}</div><div style={{fontSize:10,fontWeight:700,color:bal>0?"#F97316":"#10B981"}}>{bal>0?`₹${bal.toLocaleString()} due`:"Paid ✅"}</div></div>
          </div>
          <div style={{display:"flex",gap:6}}>
            <button className="btn-sm"style={{background:"#0B4F8A",color:"white"}}onClick={()=>printDoc(buildQuotationHTML(q))}>🖨️ Print Invoice</button>
            <button className="btn-sm"style={{background:"#D1FAE5",color:"#065F46"}}onClick={()=>openWA(q.phone,`Hello ${q.customerName}! 🧾\n\n*Invoice – Sai Suman Glass & Hardware*\n\n🔧 ${q.items?.[0]?.desc||""}\n💰 Total: ₹${Number(q.total||0).toLocaleString()}\n✅ Paid: ₹${Number(j?.paid||0).toLocaleString()}\n${bal>0?`⚠️ Balance: ₹${bal.toLocaleString()}`:"✅ Fully Paid"}\n\n📞 +91 84215 02507\n— Sai Suman Glass & Hardware, Nashik`)}>💬 Send WA</button>
          </div>
        </div>;})}
      </div>
    </>}

    {/* ── PAYMENTS ── */}
    {tab==="payments"&&<>
      <SectionHead title="💰 Payments"/>
      <div className="g2"><StatCard label="Total Billed"value={`₹${(totalRev/1000).toFixed(1)}k`}color="#0B4F8A"icon="📄"sub="All jobs"/><StatCard label="Balance Due"value={`₹${((totalRev-totalRec)/1000).toFixed(1)}k`}color="#F97316"icon="⚠️"sub="Pending"/></div>
      <div className="card">
        <div style={{padding:"9px 13px",borderBottom:"1px solid #EEF5FA",fontSize:12,fontWeight:700,color:"var(--dark)"}}>Payment Status per Job</div>
        {jobs.filter(j=>j.amount>0).sort((a,b)=>(+b.amount-+b.paid)-(+a.amount-+a.paid)).map(j=>{const bal=(+j.amount||0)-(+j.paid||0);const pct=Math.min(100,Math.round(((+j.paid||0)/(+j.amount||1))*100));return<div key={j.id}className="row-item"onClick={()=>setModal({type:"job",data:j})}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}><div><div style={{fontWeight:700,fontSize:13,color:"var(--dark)"}}>{j.name}</div><div style={{fontSize:11,color:"var(--mid)"}}>{j.service}</div></div><div style={{textAlign:"right"}}><div style={{fontWeight:800,fontSize:13,color:bal>0?"#F97316":"#10B981"}}>{bal>0?`₹${bal.toLocaleString()} due`:"Paid ✅"}</div><div style={{fontSize:10,color:"var(--light)"}}>₹{Number(j.paid||0).toLocaleString()} / ₹{Number(j.amount).toLocaleString()}</div></div></div>
          <div className="progress-track"><div className="progress-fill"style={{width:`${pct}%`,background:pct===100?"#10B981":"#1A73C8"}}/></div>
        </div>;})}
      </div>
    </>}

    {/* ── STOCK ── */}
    {tab==="stock"&&<>
      <SectionHead title="📦 Stock Inventory"onAdd={()=>setModal({type:"stock",data:{}})}addLabel="＋ Add"/>
      <div className="g2"><StatCard label="Total Items"value={stock.length}color="#0B4F8A"icon="📦"sub={`₹${(stock.reduce((s,i)=>s+i.qty*i.rate,0)/1000).toFixed(1)}k value`}/><StatCard label="Low Stock"value={lowStock.length}color="#F97316"icon="⚠️"sub="Need restock"/></div>
      {lowStock.length>0&&<div className="alert-box"style={{background:"#FFF0E6",border:"1px solid #FED7AA"}}><div style={{fontWeight:700,fontSize:12,color:"#9A3412",marginBottom:4}}>⚠️ Low Stock Alert</div>{lowStock.map(i=><div key={i.id}style={{fontSize:11,color:"#9A3412",marginBottom:2}}>• {i.name}: {i.qty} {i.unit} (min: {i.minQty})</div>)}</div>}
      <div className="card">
        {STOCK_CATS.map(cat=>{const items=stock.filter(i=>i.cat===cat);if(!items.length)return null;return<div key={cat}><div style={{padding:"6px 13px",background:"#F5FAFE",fontSize:10,fontWeight:700,color:"var(--blue)",letterSpacing:1,textTransform:"uppercase"}}>{cat}</div>{items.map(i=><div key={i.id}className="row-item"onClick={()=>setModal({type:"stock",data:i})}><div style={{display:"flex",alignItems:"center",gap:10}}><div style={{flex:1}}><div style={{fontWeight:600,fontSize:13,color:"var(--dark)"}}>{i.name}</div><div style={{fontSize:11,color:"var(--mid)"}}>₹{i.rate}/{i.unit} · Total: ₹{(i.qty*i.rate).toLocaleString()}</div></div><div style={{textAlign:"right"}}><div style={{fontWeight:800,fontSize:14,color:i.qty<=i.minQty?"#EF4444":"var(--dark)"}}>{i.qty}<span style={{fontSize:10,fontWeight:400}}> {i.unit}</span></div>{i.qty<=i.minQty&&<div style={{fontSize:9,color:"#EF4444",fontWeight:700}}>LOW STOCK</div>}</div></div></div>)}</div>;})}
        {stock.length===0&&<EmptyState msg="No stock items added"/>}
      </div>
    </>}

    {/* ── PURCHASES ── */}
    {tab==="purchases"&&<>
      <SectionHead title="🛒 Purchases"onAdd={()=>setModal({type:"purchase",data:{date:TODAY,items:[{desc:"",qty:1,unit:"sq.ft",rate:0,amount:0}],total:0,paid:0}})}addLabel="＋ Add"/>
      {(()=>{const t=purchases.reduce((s,p)=>s+(+p.total||0),0);const p=purchases.reduce((s,p)=>s+(+p.paid||0),0);return<div className="g2"><StatCard label="Total Purchased"value={`₹${(t/1000).toFixed(1)}k`}color="#0B4F8A"icon="🛒"sub="All time"/><StatCard label="Due to Suppliers"value={`₹${((t-p)/1000).toFixed(1)}k`}color="#F97316"icon="⚠️"sub="Pending"/></div>;})()}
      <div className="card">
        {purchases.length===0&&<EmptyState msg="No purchases recorded"/>}
        {purchases.sort((a,b)=>b.date.localeCompare(a.date)).map(p=>{const bal=(+p.total||0)-(+p.paid||0);return<div key={p.id}className="row-item"onClick={()=>setModal({type:"purchase",data:p})}>
          <div style={{display:"flex",alignItems:"center",gap:10}}><div style={{flex:1}}><div style={{fontWeight:700,fontSize:13,color:"var(--dark)"}}>{p.supplier}</div><div style={{fontSize:11,color:"var(--mid)"}}>📅{p.date} · {p.items?.length||0} items{p.note?` · ${p.note}`:""}</div></div><div style={{textAlign:"right"}}><div style={{fontWeight:800,fontSize:13,color:"var(--dark)"}}>₹{Number(p.total||0).toLocaleString()}</div><div style={{fontSize:10,fontWeight:700,color:bal>0?"#F97316":"#10B981"}}>{bal>0?`₹${bal.toLocaleString()} due`:"Paid ✅"}</div></div></div>
        </div>;})}
      </div>
    </>}

    {/* ── EXPENSES ── */}
    {tab==="expenses"&&<>
      <SectionHead title="💸 Expenses"onAdd={()=>setModal({type:"expense",data:{date:TODAY,cat:"Labour",paidBy:"Cash"}})}addLabel="＋ Add"/>
      <StatCard label="Total Expenses"value={`₹${(totalExp/1000).toFixed(1)}k`}color="#EF4444"icon="💸"sub="All recorded"/>
      <div className="card"style={{padding:"13px"}}><div style={{fontWeight:700,fontSize:12,color:"var(--dark)",marginBottom:10}}>By Category</div>{EXP_CATS.map(cat=>{const t=expenses.filter(e=>e.cat===cat).reduce((s,e)=>s+(+e.amount||0),0);if(!t)return null;const pct=totalExp>0?Math.round(t/totalExp*100):0;return<div key={cat}style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}><div style={{width:85,fontSize:11,color:"var(--mid)",flexShrink:0}}>{cat}</div><div className="progress-track"style={{flex:1}}><div className="progress-fill"style={{width:`${pct}%`,background:"#1A73C8"}}/></div><div style={{fontSize:11,fontWeight:600,color:"var(--dark)",width:44,textAlign:"right",flexShrink:0}}>₹{(t/1000).toFixed(1)}k</div></div>;})}
      </div>
      <div className="card">
        <div style={{padding:"9px 13px",borderBottom:"1px solid #EEF5FA",fontSize:12,fontWeight:700,color:"var(--dark)"}}>All Expenses</div>
        {expenses.length===0&&<EmptyState msg="No expenses recorded"/>}
        {expenses.sort((a,b)=>b.date.localeCompare(a.date)).map(e=><div key={e.id}className="row-item"onClick={()=>setModal({type:"expense",data:e})}><div style={{display:"flex",alignItems:"center",gap:10}}><div style={{flex:1}}><div style={{fontWeight:600,fontSize:13,color:"var(--dark)"}}>{e.desc}</div><div style={{fontSize:11,color:"var(--mid)"}}>📅{e.date} · {e.cat} · {e.paidBy}</div></div><div style={{fontWeight:800,fontSize:14,color:"#EF4444"}}>₹{Number(e.amount||0).toLocaleString()}</div></div></div>)}
      </div>
    </>}

    {/* ── REMINDERS ── */}
    {tab==="reminders"&&<>
      <SectionHead title="🔔 Reminders"onAdd={()=>setModal({type:"reminder",data:{date:TODAY}})}addLabel="＋ Add"/>
      {(()=>{
        const overdue=reminders.filter(r=>!r.done&&r.date<TODAY);
        const todayR=reminders.filter(r=>!r.done&&r.date===TODAY);
        const upcoming=reminders.filter(r=>!r.done&&r.date>TODAY);
        const done=reminders.filter(r=>r.done);
        const RCard=({r})=><div style={{background:"white",borderRadius:12,padding:"11px 12px",marginBottom:7,boxShadow:"0 2px 8px rgba(11,79,138,.06)",opacity:r.done?.55:1}}>
          <div style={{display:"flex",alignItems:"center",gap:8}}><input type="checkbox"checked={r.done}onChange={()=>toggleRem(r.id)}style={{width:17,height:17,cursor:"pointer",accentColor:"#10B981",flexShrink:0}}/><div style={{flex:1}}><div style={{fontWeight:700,fontSize:13,color:"var(--dark)",textDecoration:r.done?"line-through":"none"}}>{r.customerName}</div><div style={{fontSize:11,color:"var(--mid)"}}>📅{r.date} · {r.note}</div></div><div style={{display:"flex",gap:5}}><button className="btn-sm"style={{background:"#D1FAE5",color:"#065F46"}}onClick={()=>openWA(r.phone,`Hello ${r.customerName}! 😊\n\nFollowing up from *Sai Suman Glass & Hardware, Nashik*.\n\n${r.note||"Checking in about your requirements."}\n\nFeel free to call us!\n📞 +91 84215 02507`)}>💬</button><button className="btn-sm"style={{background:"#EEF5FA",color:"var(--blue)"}}onClick={()=>setModal({type:"reminder",data:r})}>✏️</button></div></div>
        </div>;
        return<>
          {overdue.length>0&&<><div style={{fontWeight:700,fontSize:10,color:"#EF4444",letterSpacing:1.5,textTransform:"uppercase",marginBottom:5}}>🔴 Overdue ({overdue.length})</div>{overdue.map(r=><RCard key={r.id}r={r}/>)}</>}
          {todayR.length>0&&<><div style={{fontWeight:700,fontSize:10,color:"#F59E0B",letterSpacing:1.5,textTransform:"uppercase",marginBottom:5}}>🟡 Today ({todayR.length})</div>{todayR.map(r=><RCard key={r.id}r={r}/>)}</>}
          {upcoming.length>0&&<><div style={{fontWeight:700,fontSize:10,color:"#10B981",letterSpacing:1.5,textTransform:"uppercase",marginBottom:5}}>🟢 Upcoming ({upcoming.length})</div>{upcoming.map(r=><RCard key={r.id}r={r}/>)}</>}
          {done.length>0&&<><div style={{fontWeight:700,fontSize:10,color:"var(--light)",letterSpacing:1.5,textTransform:"uppercase",marginBottom:5}}>✅ Done ({done.length})</div>{done.map(r=><RCard key={r.id}r={r}/>)}</>}
          {reminders.length===0&&<div className="card"><EmptyState msg="No reminders yet. Add your first follow-up!"/></div>}
        </>;
      })()}
    </>}

    {/* ── WA TEMPLATES ── */}
    {tab==="templates"&&<>
      <div style={{fontWeight:800,fontSize:15,color:"var(--dark)"}}>💬 WhatsApp Templates</div>
      {!tplSel?(<div style={{display:"flex",flexDirection:"column",gap:8}}>
        {WA_TPLS.map(t=><div key={t.id}className="wa-template-card"onClick={()=>setTplSel(t)}>
          <div style={{fontSize:22,flexShrink:0}}>{t.icon}</div>
          <div style={{flex:1}}><div style={{fontWeight:700,fontSize:13,color:"var(--dark)"}}>{t.name}</div><div style={{fontSize:11,color:"var(--mid)",marginTop:2}}>{t.msg.slice(0,55)}...</div></div>
          <div style={{color:"var(--blue2)",fontSize:18}}>→</div>
        </div>)}
      </div>):(
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          <button style={{background:"#EEF5FA",color:"var(--blue)",borderRadius:8,padding:"7px 14px",fontSize:12,fontWeight:700,border:"none",cursor:"pointer",alignSelf:"flex-start"}}onClick={()=>setTplSel(null)}>← Back</button>
          <div className="card"style={{padding:"13px"}}>
            <div style={{fontWeight:700,fontSize:14,color:"var(--dark)",marginBottom:10}}>{tplSel.icon} {tplSel.name}</div>
            <div style={{fontWeight:700,fontSize:10,color:"var(--blue2)",letterSpacing:1.5,textTransform:"uppercase",marginBottom:8}}>Fill Variables</div>
            <div className="g2"style={{marginBottom:10}}>{[["name","Customer Name"],["service","Service"],["date","Date"],["address","Address"],["amount","Total (₹)"],["paid","Paid (₹)"],["balance","Balance (₹)"]].map(([k,l])=><div key={k}><label className="lbl">{l}</label><input value={tplVars[k]}onChange={e=>setTplVars(v=>({...v,[k]:e.target.value}))}placeholder={`{${k}}`}/></div>)}</div>
          </div>
          <div className="template-preview">{fillTpl(tplSel.msg)}</div>
          <div style={{display:"flex",gap:8}}>
            <button style={{flex:1,background:"var(--blue)",color:"white",border:"none",borderRadius:9,padding:"12px",fontWeight:700,fontSize:13,cursor:"pointer"}}onClick={()=>{navigator.clipboard.writeText(fillTpl(tplSel.msg));setCopied(true);showToast("✅ Copied!");setTimeout(()=>setCopied(false),2000);}}>{copied?"✅ Copied!":"📋 Copy Message"}</button>
            <button style={{flex:1,background:"#25D366",color:"white",border:"none",borderRadius:9,padding:"12px",fontWeight:700,fontSize:13,cursor:"pointer"}}onClick={()=>openWA(tplVars.phone,fillTpl(tplSel.msg))}>💬 Open WhatsApp</button>
          </div>
        </div>
      )}
    </>}

    </div>{/* end content */}

    {/* MODALS */}
    {modal?.type==="job"&&<JobModal data={modal.data}onSave={saveJob}onDel={delJob}onClose={closeModal}/>}
    {modal?.type==="quote"&&<QuoteModal data={modal.data}onSave={saveQuote}onDel={delQuote}onClose={closeModal}/>}
    {modal?.type==="stock"&&<StockModal data={modal.data}onSave={saveStock}onDel={delStock}onClose={closeModal}/>}
    {modal?.type==="purchase"&&<PurchModal data={modal.data}onSave={savePurch}onDel={delPurch}onClose={closeModal}/>}
    {modal?.type==="expense"&&<ExpModal data={modal.data}onSave={saveExp}onDel={delExp}onClose={closeModal}/>}
    {modal?.type==="reminder"&&<RemModal data={modal.data}onSave={saveRem}onDel={delRem}onClose={closeModal}/>}

    {toast&&<div className="toast">{toast}</div>}
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);

</script>
</body>
</html>
